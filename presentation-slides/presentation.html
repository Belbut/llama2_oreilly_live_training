    # Open Models: How We Got Here

    | Date | Model | Why It Mattered |
    |------|-------|-----------------|
    | Apr 2024 | Llama 3 | Open weights with a commercial license |
    | Dec 2024 | Llama 3.3 70B | Best open coding model of its generation |
    | Jan 2025 | DeepSeek-R1 | Frontier-level reasoning, MIT license |
    | Apr 2025 | Llama 4 / Qwen 3 | MoE architectures go mainstream |
    | **Apr 2026** | **Gemma 4** | **All compute tiers · multimodal · Apache 2.0** |

    --

    # Why Gemma 4 is the New Default for This Course

    --

    - **All compute tiers** — E2B and E4B run CPU-only; 26B MoE fits 8 GB VRAM; 31B dense for prosumer GPUs

    --

    - **Multimodal by default** — image and audio input across all Gemma 4 variants, no separate model needed

    --

    - **Clean commercial license** — Apache 2.0; no MAU caps, no EU restrictions, no license anxiety

    --

    - **Top benchmark quality** — Gemma 4 31B ranks #3 among all open-weight models on Chatbot Arena

    --

    - **Active development** — Google iterating fast; first-class Ollama integration

    --

    ```bash
    ollama pull gemma4:26b   # consumer GPU (8 GB VRAM)
    ollama pull gemma4:e4b   # CPU-only students
    ```

    # Local Agents in 2026

    --

    **What is a local agent?**

    --

    - An **LLM** that receives observations and decides what to do next

    --

    - A **tool loop** — the model calls functions (search, file ops, APIs, code execution)

    --

    - **Memory** — short-term (context window) + long-term (vector store / notes)

    --

    <img src="../notebooks/assets-resources/agent-loop.png" width="90%">

    <p class="footnote">
        <a href='https://blog.langchain.dev/openais-bet-on-a-cognitive-architecture/'>Explanation of the agent loop in cognitive architectures.</a>
    </p>

    ---

    # Small Language Models for Local Agents

    --

    - SLMs (1B–14B) are now strong enough for **narrow, bounded agentic tasks**

    --

    - Classification, extraction, tool routing, short summarization → SLMs handle these well

    --

    - SLMs fail on: multi-step reasoning chains, ambiguous planning, cross-document synthesis

    --

    - **Rule of thumb:** use local SLMs for bounded execution; route to larger/cloud models for open-ended judgment

    --

    - The right architecture: **local model + retrieval + tools + eval set + fallback router**

    <p style="font-size: 14px; margin-top: 20px;">
        <a href='https://arxiv.org/pdf/2506.02153'>SLMs for Agentic Tasks — arXiv 2506.02153</a>
    </p>

    ---

    # Hermes Agent — Full Local Agent Workbench

    --

    - Built by **Nous Research** — auto-detects models running in Ollama

    --

    - **Per-model tool parsers** — adapts tool calling format to each model automatically

    --

    - **118 bundled skills** — file ops, web search, calendar, notes, code execution, and more

    --

    - Persistent memory + messaging integrations + autonomous task execution

    --

    - Best framing for students:

    > *smolagents teaches how agents work. Hermes shows what a local-first agent product can become.*

    <p style="font-size: 14px; margin-top: 20px;">
        <a href='https://hermes-agent.nousresearch.com/'>hermes-agent.nousresearch.com</a>
    </p>

    ---

    # Vibe Checking Local Agents

    --

    **The loop:**

    1. Pick a small, realistic task from your use case

    --

    2. Run the agent on it with 2–3 local models

    --

    3. Score each output on 3 axes:
       - **Completion** — did the agent finish the task goal? (0 = no, 1 = partial, 2 = yes)
       - **Tool-use correctness** — did it call the right tool with the right arguments?
       - **Hallucination** — did it stay grounded, or invent facts not in the context?

    --

    4. **Decide**: local vs. frontier
       - Local wins → use it; set up routing rule
       - Local fails → identify which axis and route those cases to a stronger model

    --

    > Build a 25-example vibe-check dataset. Score 2–3 models. Pick on evidence, not intuition.
